<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In · GitHub Clone</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Mona+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/styles.css">
<style>
  body { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
  .auth-logo { margin-bottom: 24px; }
  .auth-box { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 24px; width: 100%; max-width: 380px; }
  .auth-title { font-size: 20px; font-weight: 700; text-align: center; margin-bottom: 24px; }
  .auth-footer { text-align: center; margin-top: 16px; font-size: 13px; color: var(--text-muted); border: 1px solid var(--border); border-radius: 8px; padding: 14px; }
</style>
</head>
<body>
<div class="auth-logo">
  <svg width="48" height="48" viewBox="0 0 24 24" fill="white">
    <path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.44 9.8 8.2 11.37.6.11.82-.26.82-.57v-2.01c-3.34.72-4.04-1.61-4.04-1.61-.55-1.39-1.34-1.76-1.34-1.76-1.09-.74.08-.73.08-.73 1.2.09 1.84 1.24 1.84 1.24 1.07 1.83 2.81 1.3 3.49 1 .11-.78.42-1.3.76-1.6-2.67-.3-5.47-1.33-5.47-5.93 0-1.31.47-2.38 1.24-3.22-.13-.3-.54-1.52.12-3.18 0 0 1.01-.32 3.3 1.23a11.5 11.5 0 0 1 3-.4c1.02.01 2.04.14 3 .4 2.28-1.55 3.29-1.23 3.29-1.23.66 1.66.25 2.88.12 3.18.77.84 1.24 1.91 1.24 3.22 0 4.61-2.81 5.63-5.48 5.92.43.37.81 1.1.81 2.22v3.29c0 .32.21.69.82.57C20.56 21.8 24 17.3 24 12c0-6.63-5.37-12-12-12z"/>
  </svg>
</div>

<div class="auth-box">
  <div class="auth-title">Sign in to GitHub Clone</div>

  <div id="error-alert" class="alert alert-error" style="display:none">
    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    <span id="error-text"></span>
  </div>

  <form id="loginForm" novalidate>
    <div class="form-group">
      <label class="form-label" for="login">Username or email address</label>
      <input class="form-input" type="text" id="login" name="login" autocomplete="username" placeholder="Enter your username or email" required>
      <div class="form-error" id="login-error"></div>
    </div>

    <div class="form-group">
      <label class="form-label" for="password">
        Password
        <a href="forgot-password.html" style="float:right;font-weight:400;font-size:12px">Forgot password?</a>
      </label>
      <div style="position:relative">
        <input class="form-input" type="password" id="password" name="password" autocomplete="current-password" placeholder="Enter your password" required style="padding-right:40px">
        <button type="button" id="togglePwd" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);cursor:pointer;padding:4px">
          <svg id="eyeIcon" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
      <div class="form-error" id="password-error"></div>
    </div>

    <button type="submit" class="btn btn-primary btn-full btn-lg" id="submitBtn">
      Sign in
    </button>
  </form>
</div>

<div class="auth-footer">
  New to GitHub Clone?
  <a href="register.html" style="font-weight:600">Create an account</a>
</div>

<script src="../js/api.js"></script>
<script>
  // Redirect if already logged in
  if (Auth.isLoggedIn()) window.location.href = 'feed.html';

  const form = document.getElementById('loginForm');
  const submitBtn = document.getElementById('submitBtn');
  const errorAlert = document.getElementById('error-alert');
  const errorText = document.getElementById('error-text');

  // Password toggle
  document.getElementById('togglePwd').addEventListener('click', () => {
    const pwd = document.getElementById('password');
    pwd.type = pwd.type === 'password' ? 'text' : 'password';
    document.getElementById('eyeIcon').setAttribute('opacity', pwd.type === 'text' ? '0.5' : '1');
  });

  // Clear errors on input
  form.querySelectorAll('input').forEach(input => {
    input.addEventListener('input', () => {
      document.getElementById(input.name + '-error').textContent = '';
      errorAlert.style.display = 'none';
    });
  });

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errorAlert.style.display = 'none';

    const login = document.getElementById('login').value.trim();
    const password = document.getElementById('password').value;

    // Client-side validation
    let valid = true;
    if (!login) { document.getElementById('login-error').textContent = 'This field is required.'; valid = false; }
    if (!password) { document.getElementById('password-error').textContent = 'This field is required.'; valid = false; }
    if (!valid) return;

    setLoading(submitBtn, true);
    try {
      const data = await AuthAPI.login({ login, password });
      Auth.setToken(data.token);
      Auth.setUser(data.user);
      showToast('Welcome back, ' + data.user.username + '!');
      setTimeout(() => window.location.href = 'feed.html', 500);
    } catch (err) {
      errorAlert.style.display = 'flex';
      errorText.textContent = err.message || 'Sign in failed. Please try again.';
      setLoading(submitBtn, false);
    }
  });
</script>
</body>
</html>
