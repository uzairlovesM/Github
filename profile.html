<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile · GitHub Clone</title>
<link href="https://fonts.googleapis.com/css2?family=Mona+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/styles.css">
<style>
  .profile-header { background:var(--surface); border-bottom:1px solid var(--border); padding:24px 16px; text-align:center; }
  .avatar-wrap { position:relative; width:80px; height:80px; margin:0 auto 14px; }
  .avatar-wrap img { width:80px; height:80px; border-radius:50%; border:3px solid var(--accent); object-fit:cover; }
  .profile-stats { display:flex; justify-content:center; gap:24px; margin:14px 0 18px; }
  .profile-stat { text-align:center; cursor:pointer; }
  .profile-stat-num { font-size:18px; font-weight:700; }
  .profile-stat-label { font-size:11px; color:var(--text-muted); }
  .contrib-graph { padding:16px; background:var(--surface); border-bottom:1px solid var(--border); margin-bottom:12px; }
  .contrib-grid { display:grid; grid-template-columns:repeat(53,1fr); gap:2px; }
  .contrib-cell { aspect-ratio:1; border-radius:2px; background:var(--surface2); }
  .contrib-cell.l1 { background:#0e4429; }
  .contrib-cell.l2 { background:#006d32; }
  .contrib-cell.l3 { background:#26a641; }
  .contrib-cell.l4 { background:#39d353; }
  .edit-modal { display:none; position:fixed; inset:0; z-index:200; background:rgba(0,0,0,0.7); backdrop-filter:blur(4px); align-items:flex-end; justify-content:center; }
  .edit-modal.active { display:flex; }
  .edit-sheet { background:var(--surface); border:1px solid var(--border); border-radius:12px 12px 0 0; width:100%; max-height:90vh; overflow-y:auto; animation:slideUp 0.3s ease; }
</style>
</head>
<body>

<nav class="topnav">
  <a href="feed.html" class="topnav-logo">
    <svg width="26" height="26" viewBox="0 0 24 24" fill="white"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.44 9.8 8.2 11.37.6.11.82-.26.82-.57v-2.01c-3.34.72-4.04-1.61-4.04-1.61-.55-1.39-1.34-1.76-1.34-1.76-1.09-.74.08-.73.08-.73 1.2.09 1.84 1.24 1.84 1.24 1.07 1.83 2.81 1.3 3.49 1 .11-.78.42-1.3.76-1.6-2.67-.3-5.47-1.33-5.47-5.93 0-1.31.47-2.38 1.24-3.22-.13-.3-.54-1.52.12-3.18 0 0 1.01-.32 3.3 1.23a11.5 11.5 0 0 1 3-.4c1.02.01 2.04.14 3 .4 2.28-1.55 3.29-1.23 3.29-1.23.66 1.66.25 2.88.12 3.18.77.84 1.24 1.91 1.24 3.22 0 4.61-2.81 5.63-5.48 5.92.43.37.81 1.1.81 2.22v3.29c0 .32.21.69.82.57C20.56 21.8 24 17.3 24 12c0-6.63-5.37-12-12-12z"/></svg>
    Profile
  </a>
  <div class="topnav-actions">
    <button class="btn btn-secondary btn-sm" onclick="Auth.logout()">Sign out</button>
  </div>
</nav>

<!-- Profile Header -->
<div class="profile-header" id="profileHeader">
  <div style="padding:30px;text-align:center"><div class="spinner"></div></div>
</div>

<!-- Tabs -->
<div class="tabs" id="profileTabs" style="display:none">
  <div class="tab active" onclick="switchTab('repos',this)">
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
    Repositories
    <span class="tab-count" id="repoCount">0</span>
  </div>
  <div class="tab" onclick="switchTab('starred',this)">⭐ Starred</div>
  <div class="tab" onclick="switchTab('activity',this)">📊 Activity</div>
  <div class="tab" onclick="switchTab('settings',this)">⚙️ Settings</div>
</div>

<!-- Content -->
<div id="tabContent" style="padding:12px">
  <div style="padding:20px;text-align:center"><div class="spinner"></div></div>
</div>

<!-- Contribution graph -->
<div class="contrib-graph" id="contribGraph" style="display:none">
  <div style="font-size:12px;color:var(--text-muted);margin-bottom:10px" id="contribTitle"></div>
  <div class="contrib-grid" id="contribGrid"></div>
</div>

<!-- Bottom Nav -->
<nav class="bottomnav">
  <a class="nav-item" href="feed.html"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 3h8v8H3zm10 0h8v8h-8zM3 13h8v8H3zm13 0a4 4 0 1 1 0 8 4 4 0 0 1 0-8z"/></svg><span class="nav-label">Feed</span></a>
  <a class="nav-item" href="explore.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg><span class="nav-label">Explore</span></a>
  <a class="nav-item" href="new-repo.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg><span class="nav-label">New</span></a>
  <a class="nav-item" href="notifications.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg><span class="nav-label">Inbox</span></a>
  <a class="nav-item active" href="profile.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span class="nav-label">Profile</span></a>
</nav>

<script src="../js/api.js"></script>
<script>
  requireAuth();
  let userData = null;
  let currentTab = 'repos';

  async function loadProfile() {
    try {
      const user = Auth.getUser();
      const [meData, reposData] = await Promise.all([AuthAPI.me(), UsersAPI.repos(user.username)]);
      userData = meData.user;
      Auth.setUser(userData);

      document.getElementById('repoCount').textContent = reposData.repos.length;

      document.getElementById('profileHeader').innerHTML = `
        <div class="avatar-wrap">
          <img src="${userData.avatar_url || `https://ui-avatars.com/api/?name=${userData.username}&size=200&background=0d1117&color=58a6ff`}" alt="${userData.username}">
        </div>
        <div style="font-size:22px;font-weight:700;margin-bottom:2px">${userData.name || userData.username}</div>
        <div style="color:var(--text-muted);margin-bottom:10px">@${userData.username}</div>
        ${userData.bio ? `<div style="font-size:13px;color:var(--text-muted);margin-bottom:14px;max-width:280px;margin-left:auto;margin-right:auto">${userData.bio}</div>` : ''}
        <div class="profile-stats">
          <div class="profile-stat" onclick="switchTab('repos',null)"><div class="profile-stat-num">${userData.public_repos}</div><div class="profile-stat-label">Repos</div></div>
          <div class="profile-stat"><div class="profile-stat-num">${formatNumber(userData.followers)}</div><div class="profile-stat-label">Followers</div></div>
          <div class="profile-stat"><div class="profile-stat-num">${formatNumber(userData.following)}</div><div class="profile-stat-label">Following</div></div>
        </div>
        ${userData.location ? `<div style="font-size:12px;color:var(--text-muted);margin-bottom:6px">📍 ${userData.location}</div>` : ''}
        ${userData.website ? `<div style="font-size:12px;margin-bottom:10px"><a href="${userData.website}" target="_blank">${userData.website}</a></div>` : ''}
        <div style="display:flex;gap:8px;justify-content:center">
          <button class="btn btn-secondary btn-sm" onclick="openEditModal()">✏️ Edit profile</button>
          <button class="btn btn-danger btn-sm" onclick="Auth.logout()">Sign out</button>
        </div>
      `;

      document.getElementById('profileTabs').style.display = 'flex';
      loadRepos(reposData.repos);
      generateContribGraph(userData);
    } catch(e) {
      document.getElementById('profileHeader').innerHTML = `<div class="alert alert-error">Failed to load profile: ${e.message}</div>`;
    }
  }

  function switchTab(tab, btn) {
    currentTab = tab;
    if (btn) { document.querySelectorAll('.tab').forEach(t => t.classList.remove('active')); btn.classList.add('active'); }
    if (tab === 'repos') loadReposTab();
    else if (tab === 'starred') loadStarredTab();
    else if (tab === 'activity') loadActivityTab();
    else if (tab === 'settings') loadSettingsTab();
  }

  async function loadReposTab() {
    const user = Auth.getUser();
    const data = await UsersAPI.repos(user.username);
    loadRepos(data.repos);
  }

  function loadRepos(repos) {
    const content = document.getElementById('tabContent');
    if (!repos.length) {
      content.innerHTML = `<div class="empty-state"><h3>No repositories yet</h3><p>Create your first repository to get started.</p><div style="margin-top:16px"><a class="btn btn-primary" href="new-repo.html">New Repository</a></div></div>`;
      return;
    }
    content.innerHTML = repos.map((r, i) => `
      <a href="repo.html?owner=${userData.username}&repo=${r.name}" style="text-decoration:none;display:block;margin-bottom:10px;animation:fadeUp 0.3s ease ${i*0.04}s both">
        <div class="repo-card">
          <div class="repo-card-name">${r.name} ${r.is_private ? '<span class="badge badge-gray">Private</span>' : '<span class="badge badge-blue">Public</span>'}</div>
          <div class="repo-card-desc">${r.description || 'No description'}</div>
          <div class="repo-card-stats">
            ${r.language ? `<span class="repo-stat"><span class="lang-dot" style="background:${langColor(r.language)}"></span>${r.language}</span>` : ''}
            <span class="repo-stat">⭐ ${formatNumber(r.stars_count)}</span>
            <span class="repo-stat" style="margin-left:auto;color:var(--text-dim)">Updated ${formatDate(r.updated_at)}</span>
          </div>
        </div>
      </a>`).join('');
  }

  async function loadStarredTab() {
    const content = document.getElementById('tabContent');
    content.innerHTML = '<div style="padding:20px;text-align:center"><div class="spinner"></div></div>';
    try {
      const user = Auth.getUser();
      const data = await UsersAPI.starred(user.username);
      if (!data.repos.length) { content.innerHTML = '<div class="empty-state"><h3>No starred repos</h3><p>Star repositories to save them here.</p></div>'; return; }
      content.innerHTML = data.repos.map(r => `
        <a href="repo.html?owner=${r.owner_username}&repo=${r.name}" style="text-decoration:none;display:block;margin-bottom:10px">
          <div class="repo-card">
            <div class="repo-card-name">⭐ ${r.owner_username}/${r.name}</div>
            <div class="repo-card-desc">${r.description || 'No description'}</div>
            <div class="repo-card-stats">
              ${r.language ? `<span class="repo-stat"><span class="lang-dot" style="background:${langColor(r.language)}"></span>${r.language}</span>` : ''}
              <span class="repo-stat">⭐ ${formatNumber(r.stars_count)}</span>
            </div>
          </div>
        </a>`).join('');
    } catch { content.innerHTML = '<div class="alert alert-error">Failed to load starred repos</div>'; }
  }

  async function loadActivityTab() {
    const content = document.getElementById('tabContent');
    content.innerHTML = '<div style="padding:20px;text-align:center"><div class="spinner"></div></div>';
    try {
      const user = Auth.getUser();
      const data = await UsersAPI.activity(user.username);
      if (!data.activity.length) { content.innerHTML = '<div class="empty-state"><h3>No activity yet</h3></div>'; return; }
      const icons = { star:'⭐', create_repo:'📦', follow:'👥', issue:'🐛', pr:'🔀' };
      content.innerHTML = data.activity.map(a => `
        <div style="display:flex;gap:12px;padding:12px;border-bottom:1px solid var(--border2)">
          <div style="width:32px;height:32px;background:var(--surface2);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0">${icons[a.type]||'🔔'}</div>
          <div>
            <div style="font-size:13px;color:var(--text)">${a.type === 'create_repo' ? `Created repository <strong>${a.repo_name}</strong>` : a.type === 'star' ? `Starred <strong>${a.repo_name}</strong>` : a.type}</div>
            <div style="font-size:11px;color:var(--text-dim);margin-top:3px">${formatDate(a.created_at)}</div>
          </div>
        </div>`).join('');
    } catch { content.innerHTML = '<div class="alert alert-error">Failed to load activity</div>'; }
  }

  function loadSettingsTab() {
    if (!userData) return;
    const content = document.getElementById('tabContent');
    content.innerHTML = `
      <h3 style="margin-bottom:16px">Edit Profile</h3>
      <div id="settings-alert" class="alert alert-success" style="display:none">Profile updated successfully!</div>
      <form id="settingsForm">
        <div class="form-group"><label class="form-label">Display name</label><input class="form-input" id="s-name" value="${userData.name||''}"></div>
        <div class="form-group"><label class="form-label">Bio <span style="color:var(--text-muted);font-weight:400">(max 160)</span></label><textarea class="form-textarea" id="s-bio" maxlength="160">${userData.bio||''}</textarea></div>
        <div class="form-group"><label class="form-label">Website</label><input class="form-input" type="url" id="s-website" placeholder="https://yoursite.com" value="${userData.website||''}"></div>
        <div class="form-group"><label class="form-label">Location</label><input class="form-input" id="s-location" placeholder="City, Country" value="${userData.location||''}"></div>
        <div class="form-group"><label class="form-label">Company</label><input class="form-input" id="s-company" placeholder="@company" value="${userData.company||''}"></div>
        <button type="button" class="btn btn-primary btn-full" id="saveProfileBtn" onclick="saveProfile()">Save changes</button>
      </form>
      <div class="divider" style="margin:24px 0"></div>
      <h3 style="margin-bottom:16px;color:var(--red)">Change Password</h3>
      <form id="passwordForm">
        <div class="form-group"><label class="form-label">Current password</label><input class="form-input" type="password" id="p-current" placeholder="Your current password"></div>
        <div class="form-group"><label class="form-label">New password</label><input class="form-input" type="password" id="p-new" placeholder="Min 8 chars, 1 uppercase, 1 number"></div>
        <div class="form-group"><label class="form-label">Confirm new password</label><input class="form-input" type="password" id="p-confirm" placeholder="Repeat new password"></div>
        <div class="form-error" id="p-error" style="margin-bottom:10px"></div>
        <button type="button" class="btn btn-danger btn-full" id="savePwdBtn" onclick="savePassword()">Update password</button>
      </form>`;
  }

  async function saveProfile() {
    const btn = document.getElementById('saveProfileBtn');
    setLoading(btn, true);
    try {
      await AuthAPI.updateProfile({
        name: document.getElementById('s-name').value,
        bio: document.getElementById('s-bio').value,
        website: document.getElementById('s-website').value,
        location: document.getElementById('s-location').value,
        company: document.getElementById('s-company').value,
      });
      document.getElementById('settings-alert').style.display = 'flex';
      showToast('Profile updated!');
      loadProfile();
    } catch(e) { showToast(e.message, 'error'); }
    setLoading(btn, false);
  }

  async function savePassword() {
    const btn = document.getElementById('savePwdBtn');
    const errEl = document.getElementById('p-error');
    errEl.textContent = '';
    const cur = document.getElementById('p-current').value;
    const np = document.getElementById('p-new').value;
    const cp = document.getElementById('p-confirm').value;
    if (np !== cp) { errEl.textContent = 'Passwords do not match.'; return; }
    setLoading(btn, true);
    try {
      await AuthAPI.changePassword({ currentPassword: cur, newPassword: np });
      showToast('Password updated!');
      ['p-current','p-new','p-confirm'].forEach(id => document.getElementById(id).value = '');
    } catch(e) { errEl.textContent = e.message; }
    setLoading(btn, false);
  }

  function generateContribGraph(user) {
    const graph = document.getElementById('contribGraph');
    graph.style.display = 'block';
    document.getElementById('contribTitle').textContent = `Contributions in the last year`;
    const grid = document.getElementById('contribGrid');
    const levels = ['', 'l1', 'l2', 'l3', 'l4'];
    let html = '';
    for (let i = 0; i < 53 * 7; i++) {
      const r = Math.random();
      let lv = '';
      if (r > 0.55) lv = 'l1';
      if (r > 0.72) lv = 'l2';
      if (r > 0.86) lv = 'l3';
      if (r > 0.95) lv = 'l4';
      html += `<div class="contrib-cell ${lv}"></div>`;
    }
    grid.innerHTML = html;
  }

  loadProfile();
</script>
</body>
</html>
