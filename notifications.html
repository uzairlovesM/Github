<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notifications · GitHub Clone</title>
<link href="https://fonts.googleapis.com/css2?family=Mona+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/styles.css">
<style>
  .notif-item { display:flex; gap:12px; padding:14px 16px; border-bottom:1px solid var(--border2); cursor:pointer; position:relative; transition:background 0.15s; }
  .notif-item.unread { background:rgba(88,166,255,0.04); }
  .notif-item:active { background:var(--surface2); }
  .notif-dot { width:8px; height:8px; background:var(--accent); border-radius:50%; flex-shrink:0; margin-top:6px; }
  .notif-dot.hidden { background:transparent; }
  .notif-icon { width:36px; height:36px; border-radius:50%; background:var(--surface2); display:flex; align-items:center; justify-content:center; flex-shrink:0; font-size:16px; }
  .notif-content { flex:1; min-width:0; }
  .notif-repo { font-size:11px; color:var(--text-muted); margin-bottom:3px; }
  .notif-text { font-size:13px; color:var(--text); margin-bottom:4px; line-height:1.4; }
  .notif-time { font-size:11px; color:var(--text-dim); }
  .notif-dismiss { width:28px; height:28px; display:flex; align-items:center; justify-content:center; color:var(--text-dim); cursor:pointer; border-radius:4px; flex-shrink:0; }
  .notif-dismiss:hover { background:var(--surface2); color:var(--text-muted); }
</style>
</head>
<body>

<nav class="topnav">
  <a href="feed.html" class="topnav-logo">
    <svg width="26" height="26" viewBox="0 0 24 24" fill="white"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.44 9.8 8.2 11.37.6.11.82-.26.82-.57v-2.01c-3.34.72-4.04-1.61-4.04-1.61-.55-1.39-1.34-1.76-1.34-1.76-1.09-.74.08-.73.08-.73 1.2.09 1.84 1.24 1.84 1.24 1.07 1.83 2.81 1.3 3.49 1 .11-.78.42-1.3.76-1.6-2.67-.3-5.47-1.33-5.47-5.93 0-1.31.47-2.38 1.24-3.22-.13-.3-.54-1.52.12-3.18 0 0 1.01-.32 3.3 1.23a11.5 11.5 0 0 1 3-.4c1.02.01 2.04.14 3 .4 2.28-1.55 3.29-1.23 3.29-1.23.66 1.66.25 2.88.12 3.18.77.84 1.24 1.91 1.24 3.22 0 4.61-2.81 5.63-5.48 5.92.43.37.81 1.1.81 2.22v3.29c0 .32.21.69.82.57C20.56 21.8 24 17.3 24 12c0-6.63-5.37-12-12-12z"/></svg>
    Notifications
  </a>
  <div class="topnav-actions">
    <button class="btn btn-secondary btn-sm" id="markAllBtn" onclick="markAllRead()">Mark all read</button>
  </div>
</nav>

<div class="tabs">
  <div class="tab active" onclick="filterTab(this,'all')">All <span class="tab-count" id="allCount">0</span></div>
  <div class="tab" onclick="filterTab(this,'unread')">Unread <span class="tab-count" id="unreadCount">0</span></div>
</div>

<div id="notifList">
  <div style="padding:30px;text-align:center"><div class="spinner"></div></div>
</div>

<nav class="bottomnav">
  <a class="nav-item" href="feed.html"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 3h8v8H3zm10 0h8v8h-8zM3 13h8v8H3zm13 0a4 4 0 1 1 0 8 4 4 0 0 1 0-8z"/></svg><span class="nav-label">Feed</span></a>
  <a class="nav-item" href="explore.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg><span class="nav-label">Explore</span></a>
  <a class="nav-item" href="new-repo.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg><span class="nav-label">New</span></a>
  <a class="nav-item active" href="notifications.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg><span class="nav-label">Inbox</span></a>
  <a class="nav-item" href="profile.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span class="nav-label">Profile</span></a>
</nav>

<script src="../js/api.js"></script>
<script>
  requireAuth();
  let currentFilter = 'all';
  let allNotifs = [];

  const typeIcons = { issue:'🐛', pr:'🔀', star:'⭐', follow:'👥', release:'📦', commit:'📝', mention:'💬', welcome:'👋' };

  async function loadNotifications() {
    try {
      const data = await NotificationsAPI.all();
      allNotifs = data.notifications;
      document.getElementById('allCount').textContent = allNotifs.length;
      document.getElementById('unreadCount').textContent = data.unread_count;
      renderNotifs();
    } catch(e) {
      document.getElementById('notifList').innerHTML = `<div class="alert alert-error" style="margin:16px">${Auth.isLoggedIn() ? e.message : 'Please sign in to see notifications'}</div>`;
    }
  }

  function filterTab(btn, filter) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = filter;
    renderNotifs();
  }

  function renderNotifs() {
    const list = document.getElementById('notifList');
    const filtered = currentFilter === 'unread' ? allNotifs.filter(n => !n.is_read) : allNotifs;

    if (!filtered.length) {
      list.innerHTML = `
        <div class="empty-state">
          <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          <h3>${currentFilter === 'unread' ? 'All caught up!' : 'No notifications'}</h3>
          <p>${currentFilter === 'unread' ? 'You have no unread notifications.' : 'Activity from your repos will appear here.'}</p>
        </div>`;
      return;
    }

    list.innerHTML = filtered.map((n, i) => `
      <div class="notif-item ${n.is_read ? '' : 'unread'} fade-up" style="animation-delay:${i*0.04}s" data-id="${n.id}" onclick="readNotif(${n.id})">
        <div class="notif-dot ${n.is_read ? 'hidden' : ''}"></div>
        <div class="notif-icon">${typeIcons[n.type] || '🔔'}</div>
        <div class="notif-content">
          ${n.repo_name ? `<div class="notif-repo">${n.repo_owner}/${n.repo_name}</div>` : ''}
          <div class="notif-text"><strong>${n.title}</strong>${n.body ? '<br>' + n.body : ''}</div>
          <div class="notif-time">${formatDate(n.created_at)}</div>
        </div>
        <div class="notif-dismiss" onclick="event.stopPropagation();deleteNotif(${n.id})">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </div>
      </div>`).join('');
  }

  async function readNotif(id) {
    const n = allNotifs.find(x => x.id === id);
    if (n && !n.is_read) {
      n.is_read = 1;
      const el = document.querySelector(`[data-id="${id}"]`);
      if (el) { el.classList.remove('unread'); el.querySelector('.notif-dot').classList.add('hidden'); }
      const unread = allNotifs.filter(x => !x.is_read).length;
      document.getElementById('unreadCount').textContent = unread;
      await NotificationsAPI.markRead(id).catch(() => {});
    }
  }

  async function deleteNotif(id) {
    const el = document.querySelector(`[data-id="${id}"]`);
    if (el) { el.style.height = el.offsetHeight + 'px'; el.style.overflow = 'hidden'; el.style.transition = 'height 0.3s, opacity 0.3s, transform 0.3s'; el.style.height = '0'; el.style.opacity = '0'; el.style.transform = 'translateX(40px)'; setTimeout(() => el.remove(), 300); }
    allNotifs = allNotifs.filter(x => x.id !== id);
    document.getElementById('allCount').textContent = allNotifs.length;
    document.getElementById('unreadCount').textContent = allNotifs.filter(x => !x.is_read).length;
    await NotificationsAPI.delete(id).catch(() => {});
  }

  async function markAllRead() {
    await NotificationsAPI.markAllRead().catch(() => {});
    allNotifs.forEach(n => n.is_read = 1);
    document.getElementById('unreadCount').textContent = 0;
    renderNotifs();
    showToast('All notifications marked as read');
  }

  loadNotifications();
</script>
</body>
</html>
