<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Join GitHub Clone</title>
<link href="https://fonts.googleapis.com/css2?family=Mona+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/styles.css">
<style>
  body { display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding: 32px 24px; }
  .auth-logo { margin-bottom: 24px; }
  .auth-box { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 24px; width: 100%; max-width: 400px; }
  .auth-title { font-size: 20px; font-weight: 700; text-align: center; margin-bottom: 4px; }
  .auth-subtitle { color: var(--text-muted); font-size: 14px; text-align: center; margin-bottom: 24px; }
  .auth-footer { text-align: center; margin-top: 16px; font-size: 13px; color: var(--text-muted); border: 1px solid var(--border); border-radius: 8px; padding: 14px; max-width: 400px; width: 100%; }
  .strength-bar { height: 4px; border-radius: 2px; margin-top: 6px; background: var(--surface2); overflow: hidden; }
  .strength-fill { height: 100%; transition: width 0.3s, background 0.3s; width: 0; }
</style>
</head>
<body>
<div class="auth-logo">
  <svg width="48" height="48" viewBox="0 0 24 24" fill="white">
    <path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.44 9.8 8.2 11.37.6.11.82-.26.82-.57v-2.01c-3.34.72-4.04-1.61-4.04-1.61-.55-1.39-1.34-1.76-1.34-1.76-1.09-.74.08-.73.08-.73 1.2.09 1.84 1.24 1.84 1.24 1.07 1.83 2.81 1.3 3.49 1 .11-.78.42-1.3.76-1.6-2.67-.3-5.47-1.33-5.47-5.93 0-1.31.47-2.38 1.24-3.22-.13-.3-.54-1.52.12-3.18 0 0 1.01-.32 3.3 1.23a11.5 11.5 0 0 1 3-.4c1.02.01 2.04.14 3 .4 2.28-1.55 3.29-1.23 3.29-1.23.66 1.66.25 2.88.12 3.18.77.84 1.24 1.91 1.24 3.22 0 4.61-2.81 5.63-5.48 5.92.43.37.81 1.1.81 2.22v3.29c0 .32.21.69.82.57C20.56 21.8 24 17.3 24 12c0-6.63-5.37-12-12-12z"/>
  </svg>
</div>

<div class="auth-box">
  <div class="auth-title">Create your account</div>
  <div class="auth-subtitle">Join millions of developers</div>

  <div id="error-alert" class="alert alert-error" style="display:none">
    <span id="error-text"></span>
  </div>

  <form id="registerForm" novalidate>
    <div class="form-group">
      <label class="form-label" for="username">Username <span class="required">*</span></label>
      <input class="form-input" type="text" id="username" name="username" autocomplete="username" placeholder="octocat" required>
      <div class="form-hint">3–39 characters. Letters, numbers, and hyphens only.</div>
      <div class="form-error" id="username-error"></div>
    </div>

    <div class="form-group">
      <label class="form-label" for="email">Email address <span class="required">*</span></label>
      <input class="form-input" type="email" id="email" name="email" autocomplete="email" placeholder="you@example.com" required>
      <div class="form-error" id="email-error"></div>
    </div>

    <div class="form-group">
      <label class="form-label" for="name">Full name</label>
      <input class="form-input" type="text" id="name" name="name" autocomplete="name" placeholder="Mona Lisa">
    </div>

    <div class="form-group">
      <label class="form-label" for="password">Password <span class="required">*</span></label>
      <div style="position:relative">
        <input class="form-input" type="password" id="password" name="password" autocomplete="new-password" placeholder="Min 8 chars, 1 uppercase, 1 number" required style="padding-right:40px">
        <button type="button" id="togglePwd" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);cursor:pointer;padding:4px">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
      <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
      <div class="form-error" id="password-error"></div>
    </div>

    <div class="form-group">
      <label class="form-label" for="confirm">Confirm password <span class="required">*</span></label>
      <input class="form-input" type="password" id="confirm" name="confirm" autocomplete="new-password" placeholder="Repeat your password" required>
      <div class="form-error" id="confirm-error"></div>
    </div>

    <div class="form-group">
      <label class="form-checkbox">
        <input type="checkbox" id="terms" required>
        <span style="font-size:13px;color:var(--text-muted)">I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></span>
      </label>
      <div class="form-error" id="terms-error"></div>
    </div>

    <button type="submit" class="btn btn-primary btn-full btn-lg" id="submitBtn">
      Create account
    </button>
  </form>
</div>

<div class="auth-footer">
  Already have an account?
  <a href="login.html" style="font-weight:600">Sign in</a>
</div>

<script src="../js/api.js"></script>
<script>
  if (Auth.isLoggedIn()) window.location.href = 'feed.html';

  // Password strength
  document.getElementById('password').addEventListener('input', function() {
    const val = this.value;
    let score = 0;
    if (val.length >= 8) score++;
    if (/[A-Z]/.test(val)) score++;
    if (/[0-9]/.test(val)) score++;
    if (/[^A-Za-z0-9]/.test(val)) score++;
    const fill = document.getElementById('strengthFill');
    const colors = ['', '#f85149', '#d29922', '#3fb950', '#58a6ff'];
    fill.style.width = (score * 25) + '%';
    fill.style.background = colors[score] || '';
  });

  // Password toggle
  document.getElementById('togglePwd').addEventListener('click', () => {
    const pwd = document.getElementById('password');
    pwd.type = pwd.type === 'password' ? 'text' : 'password';
  });

  // Validate fields
  function validateField(id, check, msg) {
    const el = document.getElementById(id);
    const err = document.getElementById(id + '-error');
    if (!check(el.value)) { err.textContent = msg; el.style.borderColor = 'var(--red)'; return false; }
    err.textContent = ''; el.style.borderColor = ''; return true;
  }

  // Clear errors on input
  ['username','email','name','password','confirm'].forEach(id => {
    document.getElementById(id)?.addEventListener('input', () => {
      document.getElementById(id + '-error').textContent = '';
      document.getElementById(id).style.borderColor = '';
      document.getElementById('error-alert').style.display = 'none';
    });
  });

  document.getElementById('registerForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    document.getElementById('error-alert').style.display = 'none';

    const username = document.getElementById('username').value.trim();
    const email = document.getElementById('email').value.trim();
    const name = document.getElementById('name').value.trim();
    const password = document.getElementById('password').value;
    const confirm = document.getElementById('confirm').value;
    const terms = document.getElementById('terms').checked;

    let valid = true;
    valid &= validateField('username', v => /^[a-zA-Z0-9]([a-zA-Z0-9-]*[a-zA-Z0-9])?$/.test(v) && v.length >= 3 && v.length <= 39, 'Username must be 3–39 alphanumeric/hyphen chars');
    valid &= validateField('email', v => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v), 'Enter a valid email address');
    valid &= validateField('password', v => v.length >= 8 && /[A-Z]/.test(v) && /[0-9]/.test(v), 'Min 8 chars, 1 uppercase letter, 1 number');
    valid &= validateField('confirm', v => v === password, 'Passwords do not match');

    if (!terms) { document.getElementById('terms-error').textContent = 'You must accept the terms.'; valid = false; }
    else document.getElementById('terms-error').textContent = '';

    if (!valid) return;

    const submitBtn = document.getElementById('submitBtn');
    setLoading(submitBtn, true);
    try {
      const data = await AuthAPI.register({ username, email, password, name });
      Auth.setToken(data.token);
      Auth.setUser(data.user);
      showToast('Account created! Welcome, ' + data.user.username + ' 🎉');
      setTimeout(() => window.location.href = 'feed.html', 800);
    } catch (err) {
      const errAlert = document.getElementById('error-alert');
      errAlert.style.display = 'flex';
      document.getElementById('error-text').textContent = err.message || 'Registration failed.';

      // Highlight specific field errors
      if (err.details) {
        err.details.forEach(d => {
          const el = document.getElementById(d.field + '-error');
          if (el) el.textContent = d.message;
        });
      }
      setLoading(submitBtn, false);
    }
  });
</script>
</body>
</html>
