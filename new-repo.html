<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Repository · GitHub Clone</title>
<link href="https://fonts.googleapis.com/css2?family=Mona+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/styles.css">
<style>
  .owner-selector { display:flex; align-items:center; gap:8px; background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:8px 12px; }
  .owner-selector img { width:24px; height:24px; border-radius:50%; }
  .slash { color:var(--text-dim); font-size:18px; margin: 0 4px; }
  .repo-name-input { flex:1; background:none; border:none; outline:none; color:var(--text); font-size:14px; font-family:var(--font); }
  .preview-box { background:var(--surface2); border:1px solid var(--border2); border-radius:6px; padding:12px; font-size:13px; color:var(--text-muted); margin-top:8px; }
  .visibility-option { display:flex; align-items:flex-start; gap:12px; padding:14px; border:1px solid var(--border); border-radius:8px; cursor:pointer; margin-bottom:10px; transition:all 0.2s; }
  .visibility-option:hover { border-color:var(--accent); background:var(--accent-glow); }
  .visibility-option.selected { border-color:var(--accent); background:var(--accent-glow); }
  .visibility-option input { margin-top:2px; accent-color:var(--accent); }
  .tag-input { display:flex; flex-wrap:wrap; gap:6px; background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:8px; min-height:42px; }
  .tag { display:inline-flex; align-items:center; gap:4px; background:var(--accent-glow); color:var(--accent); border:1px solid rgba(88,166,255,0.3); padding:2px 8px; border-radius:20px; font-size:12px; }
  .tag-remove { cursor:pointer; opacity:0.7; }
  .tag-remove:hover { opacity:1; }
  .tag-text-input { background:none; border:none; outline:none; color:var(--text); font-size:13px; font-family:var(--font); min-width:80px; flex:1; }
</style>
</head>
<body>

<nav class="topnav">
  <a href="feed.html" class="topnav-logo">
    <svg width="26" height="26" viewBox="0 0 24 24" fill="white"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.44 9.8 8.2 11.37.6.11.82-.26.82-.57v-2.01c-3.34.72-4.04-1.61-4.04-1.61-.55-1.39-1.34-1.76-1.34-1.76-1.09-.74.08-.73.08-.73 1.2.09 1.84 1.24 1.84 1.24 1.07 1.83 2.81 1.3 3.49 1 .11-.78.42-1.3.76-1.6-2.67-.3-5.47-1.33-5.47-5.93 0-1.31.47-2.38 1.24-3.22-.13-.3-.54-1.52.12-3.18 0 0 1.01-.32 3.3 1.23a11.5 11.5 0 0 1 3-.4c1.02.01 2.04.14 3 .4 2.28-1.55 3.29-1.23 3.29-1.23.66 1.66.25 2.88.12 3.18.77.84 1.24 1.91 1.24 3.22 0 4.61-2.81 5.63-5.48 5.92.43.37.81 1.1.81 2.22v3.29c0 .32.21.69.82.57C20.56 21.8 24 17.3 24 12c0-6.63-5.37-12-12-12z"/></svg>
    Create a new repository
  </a>
</nav>

<div class="page-container">
  <p style="color:var(--text-muted);font-size:13px;margin-bottom:24px">
    A repository contains all project files, including the revision history.
  </p>

  <div id="error-alert" class="alert alert-error" style="display:none">
    <span id="error-text"></span>
  </div>

  <form id="repoForm" novalidate>
    <!-- Owner / Name -->
    <div class="form-group">
      <label class="form-label">Repository name <span class="required">*</span></label>
      <div style="display:flex;align-items:center;gap:0">
        <div class="owner-selector" style="flex-shrink:0;border-right:none;border-radius:6px 0 0 6px">
          <img id="ownerAvatar" src="" alt="">
          <span id="ownerName" style="font-size:13px;font-weight:600"></span>
        </div>
        <div style="padding:0 10px;color:var(--text-dim);background:var(--surface2);border-top:1px solid var(--border);border-bottom:1px solid var(--border);height:100%;display:flex;align-items:center;font-size:18px">/</div>
        <input class="form-input" type="text" id="repoName" placeholder="my-awesome-project" required
          style="border-radius:0 6px 6px 0;border-left:none;"
          oninput="updatePreview()">
      </div>
      <div class="form-error" id="repoName-error"></div>
      <div class="preview-box" id="repoPreview" style="display:none">
        📦 Repository will be created at: <strong id="previewPath"></strong>
      </div>
    </div>

    <!-- Description -->
    <div class="form-group">
      <label class="form-label" for="description">Description <span style="color:var(--text-dim);font-weight:400">(optional)</span></label>
      <input class="form-input" type="text" id="description" placeholder="A short description of this repository">
      <div class="form-hint">Help others understand what this project does.</div>
    </div>

    <div class="divider" style="margin:20px 0"></div>

    <!-- Visibility -->
    <div class="form-group">
      <label class="form-label">Visibility</label>
      <label class="visibility-option selected" id="opt-public" onclick="selectVisibility('public')">
        <input type="radio" name="visibility" value="public" checked>
        <div>
          <div style="font-weight:600;margin-bottom:2px">🌐 Public</div>
          <div style="font-size:12px;color:var(--text-muted)">Anyone on the internet can see this repository. You choose who can commit.</div>
        </div>
      </label>
      <label class="visibility-option" id="opt-private" onclick="selectVisibility('private')">
        <input type="radio" name="visibility" value="private">
        <div>
          <div style="font-weight:600;margin-bottom:2px">🔒 Private</div>
          <div style="font-size:12px;color:var(--text-muted)">You choose who can see and commit to this repository.</div>
        </div>
      </label>
    </div>

    <div class="divider" style="margin:20px 0"></div>

    <!-- Initialize -->
    <div class="form-group">
      <label class="form-label">Initialize this repository</label>
      <label class="form-checkbox" style="margin-bottom:12px">
        <input type="checkbox" id="autoInit">
        <div>
          <div style="font-size:13px;font-weight:500">Add a README file</div>
          <div style="font-size:12px;color:var(--text-muted)">This is where you can write a long description for your project.</div>
        </div>
      </label>
    </div>

    <!-- Language -->
    <div class="form-group">
      <label class="form-label" for="language">Primary language</label>
      <select class="form-select" id="language">
        <option value="">Select a language (optional)</option>
        <option>JavaScript</option>
        <option>TypeScript</option>
        <option>Python</option>
        <option>Rust</option>
        <option>Go</option>
        <option>Java</option>
        <option>C</option>
        <option>C++</option>
        <option>C#</option>
        <option>Ruby</option>
        <option>Swift</option>
        <option>Kotlin</option>
        <option>PHP</option>
        <option>Shell</option>
        <option>HTML</option>
        <option>CSS</option>
      </select>
    </div>

    <!-- License -->
    <div class="form-group">
      <label class="form-label" for="license">License</label>
      <select class="form-select" id="license">
        <option value="">None</option>
        <option value="MIT">MIT License</option>
        <option value="Apache-2.0">Apache License 2.0</option>
        <option value="GPL-3.0">GNU GPLv3</option>
        <option value="BSD-3-Clause">BSD 3-Clause</option>
        <option value="ISC">ISC License</option>
      </select>
    </div>

    <!-- Topics -->
    <div class="form-group">
      <label class="form-label">Topics</label>
      <div class="tag-input" id="tagInput" onclick="document.getElementById('topicInput').focus()">
        <input type="text" class="tag-text-input" id="topicInput" placeholder="Add topics (press Enter)..." onkeydown="addTopic(event)">
      </div>
      <div class="form-hint">Topics help others find your repository (e.g. react, api, mobile).</div>
    </div>

    <div class="divider" style="margin:20px 0"></div>

    <button type="submit" class="btn btn-primary btn-full btn-lg" id="submitBtn">
      Create repository
    </button>
    <a href="feed.html" class="btn btn-secondary btn-full" style="margin-top:10px;text-align:center">
      Cancel
    </a>
  </form>
</div>

<script src="../js/api.js"></script>
<script>
  if (!requireAuth()) void 0;

  const user = Auth.getUser();
  if (user) {
    document.getElementById('ownerName').textContent = user.username;
    document.getElementById('ownerAvatar').src = user.avatar_url || `https://ui-avatars.com/api/?name=${user.username}&background=161b22&color=58a6ff&size=48`;
  }

  let topics = [];

  function updatePreview() {
    const name = document.getElementById('repoName').value.trim();
    const preview = document.getElementById('repoPreview');
    if (name && user) {
      preview.style.display = 'block';
      document.getElementById('previewPath').textContent = `${user.username}/${name}`;
    } else {
      preview.style.display = 'none';
    }
  }

  function selectVisibility(v) {
    document.querySelectorAll('.visibility-option').forEach(el => el.classList.remove('selected'));
    document.getElementById('opt-' + v).classList.add('selected');
    document.querySelector(`input[value="${v}"]`).checked = true;
  }

  function addTopic(e) {
    if (e.key !== 'Enter' && e.key !== ',') return;
    e.preventDefault();
    const val = e.target.value.trim().toLowerCase().replace(/\s+/g, '-');
    if (!val || topics.includes(val) || topics.length >= 20) return;
    topics.push(val);
    renderTopics();
    e.target.value = '';
  }

  function removeTopic(t) {
    topics = topics.filter(x => x !== t);
    renderTopics();
  }

  function renderTopics() {
    const container = document.getElementById('tagInput');
    const input = document.getElementById('topicInput');
    container.innerHTML = '';
    topics.forEach(t => {
      const tag = document.createElement('span');
      tag.className = 'tag';
      tag.innerHTML = `${t} <span class="tag-remove" onclick="removeTopic('${t}')">✕</span>`;
      container.appendChild(tag);
    });
    container.appendChild(input);
  }

  document.getElementById('repoForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    document.getElementById('error-alert').style.display = 'none';
    document.getElementById('repoName-error').textContent = '';

    const name = document.getElementById('repoName').value.trim();
    const description = document.getElementById('description').value.trim();
    const is_private = document.querySelector('input[name="visibility"]:checked').value === 'private';
    const language = document.getElementById('language').value;
    const license = document.getElementById('license').value;
    const auto_init = document.getElementById('autoInit').checked;

    if (!name) { document.getElementById('repoName-error').textContent = 'Repository name is required.'; return; }
    if (!/^[a-zA-Z0-9_.-]+$/.test(name)) { document.getElementById('repoName-error').textContent = 'Only letters, numbers, _, ., - allowed.'; return; }

    const submitBtn = document.getElementById('submitBtn');
    setLoading(submitBtn, true);

    try {
      const data = await ReposAPI.create({ name, description, is_private, language, license, topics, auto_init });
      showToast('Repository created! 🎉');
      setTimeout(() => window.location.href = `repo.html?owner=${user.username}&repo=${name}`, 600);
    } catch (err) {
      document.getElementById('error-alert').style.display = 'flex';
      document.getElementById('error-text').textContent = err.message || 'Failed to create repository.';
      if (err.details) {
        err.details.forEach(d => {
          if (d.field === 'name') document.getElementById('repoName-error').textContent = d.message;
        });
      }
      setLoading(submitBtn, false);
    }
  });
</script>
</body>
</html>
